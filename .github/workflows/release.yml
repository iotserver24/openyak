name: Release Desktop

on:
  push:
    tags: ["v*"]

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npx next build
        env:
          DESKTOP_BUILD: "true"
          NEXT_PUBLIC_DESKTOP_BUILD: "true"

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          pip install -r requirements.txt pyinstaller
          pyinstaller openyak.spec --noconfirm

      - name: Build Tauri
        run: |
          cd desktop-tauri
          npx @tauri-apps/cli build --config '{"build":{"beforeBuildCommand":""}}'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
            desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe.sig

  build-macos:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npx next build
        env:
          DESKTOP_BUILD: "true"
          NEXT_PUBLIC_DESKTOP_BUILD: "true"

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          pip install -r requirements.txt pyinstaller
          pyinstaller openyak.spec --noconfirm

      - name: Build Tauri (aarch64)
        run: |
          cd desktop-tauri
          npx @tauri-apps/cli build \
            --target aarch64-apple-darwin \
            --config '{"build":{"beforeBuildCommand":""},"bundle":{"targets":["dmg"]}}'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: |
            desktop-tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            desktop-tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            desktop-tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/windows-bundle/**/*
            artifacts/macos-bundle/**/*

      - name: Generate update manifest
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"

          # Read signatures
          WIN_SIG=$(cat artifacts/windows-bundle/*.exe.sig 2>/dev/null || echo "")
          MAC_SIG=$(cat artifacts/macos-bundle/*.app.tar.gz.sig 2>/dev/null || echo "")

          # Find artifact filenames (exclude .sig files from .exe match)
          WIN_EXE=$(find artifacts/windows-bundle -name '*.exe' ! -name '*.sig' -printf '%f' -quit 2>/dev/null || echo "")
          MAC_TAR=$(find artifacts/macos-bundle -name '*.app.tar.gz' ! -name '*.sig' -printf '%f' -quit 2>/dev/null || echo "")

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Release ${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/${WIN_EXE}"
              },
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/${MAC_TAR}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload manifest as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
